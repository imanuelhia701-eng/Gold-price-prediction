<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prediksi Harga Emas - LSTM Cepat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>PREDIKSI HARGA EMAS</h2>
        <div class="subtitle">Long Short-Term Memory (LSTM) - Fast Predictions</div>
        
        <div class="status-card loading" id="status">
            <span class="loading-spinner"></span> Memuat data...
        </div>
        
        <div class="progress-wrapper" id="progressWrapper" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-label">
                <span>⚡ Melatih LSTM (Optimized)</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <div class="input-panel">
            <div class="input-group">
                <label>📅 TANGGAL</label>
                <input type="number" id="tanggal" placeholder="DD" min="1" max="31" value="">
            </div>
            <div class="input-group">
                <label>📅 BULAN</label>
                <input type="number" id="bulan" placeholder="MM" min="1" max="12" value="">
            </div>
            <div class="input-group">
                <label>📅 TAHUN</label>
                <input type="number" id="tahun" placeholder="YYYY" value="">
            </div>
            
            <div class="input-group">
                <label>KARAT</label>
                <select id="karatSelect">
                    <option value="" disabled selected hidden>Pilih Karat</option>
                    <option value="24">24 Karat (Emas Murni)</option>
                    <option value="22">22 Karat</option>
                    <option value="18">18 Karat</option>
                    <option value="14">14 Karat</option>
                    <option value="10">10 Karat</option>
                </select>
            </div>
            <div id="inputValidationMsg" class="validation-message"></div>
        </div>

        <div class="button-container">
            <button onclick="predictWithLSTM()" id="predictBtn" disabled>PREDIKSI DENGAN LSTM</button>
        </div>

        <div id="output" class="result"></div>
        
        <div class="architecture">
            ✨ Prediksi untuk tanggal APAPUN (masa lalu, sekarang, masa depan)
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
